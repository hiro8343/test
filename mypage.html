<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-80TMBGVND6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-80TMBGVND6');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ | 楽しい暗記サイト</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">

    <style>
        .profile-header {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .profile-info h2 {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .edit-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .edit-btn:hover {
            color: var(--text-main);
        }

        /* ストリーク表示 */
        .streak-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .streak-card {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.15), rgba(255, 69, 0, 0.1));
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
        }

        .streak-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .streak-value {
            font-size: 2rem;
            font-weight: 900;
            color: #ffa500;
            display: block;
        }

        .streak-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent-cyan);
            margin: 0.5rem 0;
            display: block;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .section-title {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent-purple);
            padding-left: 1rem;
            font-size: 1.5rem;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            opacity: 0.5;
            filter: grayscale(100%);
        }

        .badge-item.unlocked {
            opacity: 1;
            filter: grayscale(0%);
            border-color: var(--accent-pink);
            background: rgba(255, 0, 85, 0.1);
        }

        .badge-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .badge-name {
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* お気に入りリスト */
        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 3rem;
        }

        .fav-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fav-item-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .fav-actions {
            display: flex;
            gap: 0.5rem;
        }

        .fav-actions a,
        .fav-actions button {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .fav-exam-link {
            background: rgba(188, 19, 254, 0.2);
            color: #e0aaff;
        }

        .fav-remove-btn {
            background: rgba(255, 0, 85, 0.1);
            color: var(--accent-pink);
        }

        .fav-exam-link:hover {
            background: rgba(188, 19, 254, 0.4);
        }

        .fav-remove-btn:hover {
            background: rgba(255, 0, 85, 0.3);
        }

        /* 履歴 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 3rem;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-score {
            font-weight: bold;
            color: var(--accent-green);
        }

        .history-link {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent-cyan);
            text-decoration: none;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .history-link:hover {
            background: rgba(0, 243, 255, 0.25);
        }

        /* リクエストフォーム */
        .request-section {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.1), rgba(0, 243, 255, 0.05));
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 3rem;
        }

        .request-section h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .request-section p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .request-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .request-form input,
        .request-form textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 12px;
            color: #fff;
            font-family: var(--font-main);
            font-size: 0.9rem;
        }

        .request-form textarea {
            min-height: 100px;
            resize: vertical;
        }

        .request-form input:focus,
        .request-form textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .request-submit-btn {
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            align-self: flex-start;
        }

        .request-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(188, 19, 254, 0.4);
        }

        .empty-msg {
            color: var(--text-muted);
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>

<body>
    <nav style="padding: 1.5rem;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none;">MEMO
                GAME</a>
            <a href="exam.html" class="btn btn-sm">検定へ →</a>
        </div>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 2rem;">マイページ</h1>

        <!-- Profile Header -->
        <div class="profile-header">
            <div class="avatar-circle">👤</div>
            <div class="profile-info">
                <h2 id="user-name-display">Player <button class="edit-btn" onclick="editName()">✏️</button></h2>
                <p id="player-level" style="color: var(--accent-cyan);">ビギナー</p>
            </div>
        </div>

        <!-- ストリーク -->
        <h3 class="section-title">🔥 連続記録</h3>
        <div class="streak-row" id="streak-row">
            <!-- JSで生成 -->
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">累計スコア</span>
                <span class="stat-value" id="stat-total-score">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">受験回数</span>
                <span class="stat-value" id="stat-exams">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">獲得バッジ</span>
                <span class="stat-value" id="stat-badges">0/6</span>
            </div>
        </div>

        <!-- Badges -->
        <h3 class="section-title">獲得バッジ</h3>
        <div class="badge-grid" id="badge-grid">
            <!-- JS will populate -->
        </div>

        <!-- お気に入り -->
        <h3 class="section-title">❤️ お気に入り</h3>
        <div class="favorites-list" id="favorites-list">
            <p class="empty-msg">お気に入りはまだありません。<br>検定や暗記リストで ❤️ を押して追加しよう！</p>
        </div>

        <!-- History -->
        <h3 class="section-title">📜 プレイ履歴</h3>
        <div class="history-list" id="history-list">
            <p class="empty-msg">まだ履歴がありません。<br>検定に挑戦してスコアを記録しよう！</p>
        </div>

        <!-- リクエストフォーム -->
        <div class="request-section">
            <h3>📩 暗記リクエスト</h3>
            <p>「これも暗記検定に入れてほしい！」というものがあれば、ぜひ教えてください！</p>
            <div class="request-form">
                <input type="text" id="request-title" placeholder="リクエストのタイトル（例: ポケモン初代151匹）">
                <textarea id="request-detail" placeholder="詳細やメモ（任意）"></textarea>
                <button class="request-submit-btn" onclick="sendRequest()">📨 リクエストを送る</button>
            </div>
        </div>

    </main>

    <script src="scripts/user_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderMyPage();
        });

        function renderMyPage() {
            const data = UserData.get();

            // プロフィール
            document.getElementById('user-name-display').innerHTML = `${data.userName} <button class="edit-btn" onclick="editName()">✏️</button>`;

            // レベル計算
            let level = 'ビギナー';
            if (data.totalScore > 100) level = 'ノービス';
            if (data.totalScore > 500) level = 'アドバンス';
            if (data.totalScore > 1000) level = 'エキスパート';
            if (data.totalScore > 5000) level = 'マスター';
            document.getElementById('player-level').textContent = level;

            // 統計
            document.getElementById('stat-total-score').textContent = data.totalScore;
            document.getElementById('stat-exams').textContent = data.examsTaken;

            // ストリーク
            renderStreaks();

            // バッジ
            renderBadges(data);

            // お気に入り
            renderFavorites(data);

            // 履歴
            renderHistory(data);
        }

        function renderStreaks() {
            const streaks = UserData.getStreaks();
            const streakRow = document.getElementById('streak-row');
            streakRow.innerHTML = '';

            const items = [
                { icon: '🔥', value: streaks.days, label: '日連続' },
                { icon: '📅', value: streaks.weeks, label: '週連続' },
                { icon: '🗓️', value: streaks.months, label: 'ヶ月連続' },
                { icon: '🏆', value: streaks.years, label: '年連続' }
            ];

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'streak-card';
                card.innerHTML = `
                    <span class="streak-icon">${item.icon}</span>
                    <span class="streak-value">${item.value}</span>
                    <span class="streak-label">${item.label}</span>
                `;
                streakRow.appendChild(card);
            });
        }

        function renderBadges(data) {
            const badgeGrid = document.getElementById('badge-grid');
            badgeGrid.innerHTML = '';

            let unlockedCount = 0;
            for (const [id, info] of Object.entries(UserData.BADGES)) {
                const isUnlocked = data.badges.includes(id);
                if (isUnlocked) unlockedCount++;

                const bgDiv = document.createElement('div');
                bgDiv.className = `badge-item ${isUnlocked ? 'unlocked' : ''}`;
                bgDiv.innerHTML = `
                    <span class="badge-icon">${info.icon}</span>
                    <div class="badge-name">${info.name}</div>
                    ${isUnlocked ? '' : '<div style="font-size:0.7rem; color:#888;">???</div>'}
                `;
                if (isUnlocked) bgDiv.title = info.desc;
                badgeGrid.appendChild(bgDiv);
            }
            document.getElementById('stat-badges').textContent = `${unlockedCount}/${Object.keys(UserData.BADGES).length}`;
        }

        function renderFavorites(data) {
            const favList = document.getElementById('favorites-list');

            if (!data.favorites || data.favorites.length === 0) {
                favList.innerHTML = '<p class="empty-msg">お気に入りはまだありません。<br>検定や暗記リストで ❤️ を押して追加しよう！</p>';
                return;
            }

            favList.innerHTML = '';
            data.favorites.forEach(fav => {
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.innerHTML = `
                    <div class="fav-item-info">
                        <span>❤️</span>
                        <div>
                            <div style="font-weight:bold;">${fav.title}</div>
                            <div style="font-size:0.8rem; color:var(--text-muted);">${fav.category || ''}</div>
                        </div>
                    </div>
                    <div class="fav-actions">
                        <a href="exam.html?title=${encodeURIComponent(fav.title)}" class="fav-exam-link">🎯 検定へ</a>
                        <button class="fav-remove-btn" onclick="removeFav('${fav.title.replace(/'/g, "\\'")}')">✕</button>
                    </div>
                `;
                favList.appendChild(item);
            });
        }

        function renderHistory(data) {
            const historyList = document.getElementById('history-list');
            if (data.history.length === 0) {
                historyList.innerHTML = '<p class="empty-msg">まだ履歴がありません。<br>検定に挑戦してスコアを記録しよう！</p>';
                return;
            }

            historyList.innerHTML = '';
            data.history.forEach(h => {
                const date = new Date(h.date).toLocaleDateString();
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold;">${h.title}</div>
                        <div style="font-size:0.8rem; color:var(--text-muted);">${date} - ランク ${h.rank} - ${h.score} 点</div>
                    </div>
                    <a href="exam.html?title=${encodeURIComponent(h.title)}" class="history-link">🔄 もう一度</a>
                `;
                historyList.appendChild(item);
            });
        }

        function editName() {
            const newName = prompt("新しい名前を入力してください", UserData.get().userName);
            if (newName && newName.trim()) {
                UserData.updateName(newName.trim());
                renderMyPage();
            }
        }

        function removeFav(title) {
            UserData.removeFavorite(title);
            renderMyPage();
        }

        function sendRequest() {
            const title = document.getElementById('request-title').value.trim();
            const detail = document.getElementById('request-detail').value.trim();

            if (!title) {
                alert('タイトルを入力してください');
                return;
            }

            UserData.addRequest(title, detail);
            alert('リクエストを送信しました！ありがとうございます😊');

            // フォームクリア
            document.getElementById('request-title').value = '';
            document.getElementById('request-detail').value = '';
        }
    </script>
</body>

</html>
