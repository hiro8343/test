<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-80TMBGVND6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-80TMBGVND6');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗記の攻略本 | 楽しい暗記サイト</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <style>
        .guide-header {
            text-align: center;
            padding: 4rem 0 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 4rem 0 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .skill-card {
            background: rgba(20, 20, 31, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .skill-header {
            padding: 1.5rem;
            background: rgba(0, 243, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .skill-body {
            padding: 1.5rem;
        }

        .skill-icon {
            font-size: 2rem;
        }

        .skill-tag {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .tag-basic {
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .tag-advanced {
            color: var(--accent-purple);
            border: 1px solid var(--accent-purple);
        }

        .try-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 8px 20px;
            background: var(--accent-cyan);
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .try-btn:hover {
            opacity: 1;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--accent-cyan);
            border-radius: var(--radius-lg);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* Filter Styles */
        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn.active,
        .filter-btn:hover {
            border-color: var(--accent-cyan);
            color: #fff;
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Topに戻る</a>

        <header class="guide-header animate-fade-in">
            <span style="color: var(--accent-cyan); font-weight: bold;">AREA 2: STRATEGY GUIDE</span>
            <h1 class="text-gradient">暗記の攻略本</h1>
            <p>記憶をハックする「武器」を選ぼう。</p>
        </header>

        <main>
            <!-- フィルタ -->
            <div class="animate-fade-in delay-100">
                <div class="filters" id="filters">
                    <button class="filter-btn active" onclick="filterItems('all')">All</button>
                    <button class="filter-btn" onclick="filterItems('image')">イメージ・発想</button>
                    <button class="filter-btn" onclick="filterItems('repeat')">反復・出力</button>
                    <button class="filter-btn" onclick="filterItems('logic')">整理・理解</button>
                </div>
            </div>

            <!-- Skill Grid -->
            <div class="skill-grid animate-fade-in delay-200" id="skill-grid">
                <!-- Data will be injected here -->
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Loading strategies...</p>
            </div>
        </main>
    </div>

    <!-- Modal Template -->
    <div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content animate-pop-in">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modal-body">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('skill-grid');
        const modal = document.getElementById('modal');
        let guideData = [];
        let currentFilter = 'all';

        // Google Sheet CSV URL (Guide sheet)
        // Using gviz URL for better CSV output
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1IN-PC0r_y6WHSQs1-Xklakj72LYm43q6xUspQ0KueXE/gviz/tq?tqx=out:csv&gid=1225737060';

        // カテゴリ定義
        const CATEGORY_GROUPS = {
            'image': ['イメージ系', '変換系', '創造系', '創作系', '音楽系'],
            'repeat': ['反復系', '音声系', '思い出し系', '身体系'],
            'logic': ['構造系', '整理系', '論理系', 'その他']
        };

        // CSV Parser
        function parseCSV(text) {
            const lines = text.split('\n');
            const result = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                const matches = [];
                let currentMatch = '';
                let inQuote = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        matches.push(currentMatch);
                        currentMatch = '';
                    } else {
                        currentMatch += char;
                    }
                }
                matches.push(currentMatch);

                const row = matches.map(cell => {
                    cell = cell.trim();
                    if (cell.startsWith('"') && cell.endsWith('"')) {
                        cell = cell.slice(1, -1);
                    }
                    return cell.replace(/""/g, '"');
                });

                // Header check: "No","名前","分類","向いている人","使い方","具体例"
                if (i === 0) continue;
                if (row.length < 6) continue;

                // Simple check if it's a valid data row (e.g. check if ID is a number)
                if (isNaN(parseInt(row[0]))) continue;

                result.push({
                    id: row[0],
                    title: row[1],
                    category: row[2],
                    target: row[3],
                    usage: row[4],
                    example: row[5]
                });
            }
            return result;
        }

        async function loadData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const text = await response.text();
                guideData = parseCSV(text);
                filterItems('all');
            } catch (error) {
                console.error('Error loading sheet data:', error);
                // Fallback
                try {
                    const response = await fetch('data/guide_methods.json');
                    guideData = await response.json();
                    filterItems('all');
                } catch (e) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--accent-pink);">データの読み込みに失敗しました。</p>';
                }
            }
        }

        function filterItems(group) {
            currentFilter = group;

            // Update buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(group)) {
                    btn.classList.add('active');
                }
            });

            if (group === 'all') {
                render(guideData);
                return;
            }

            const targetCategories = CATEGORY_GROUPS[group] || [];
            const filtered = guideData.filter(item => {
                // 部分一致も含める（例: "イメージ系" で "イメージ" を含むものなど）
                // ここでは単純に配列に含まれるかで判定しつつ、柔軟性も持たせる
                if (targetCategories.includes(item.category)) return true;

                // データ側のカテゴリ表記が微妙に違う場合の救済
                // 例: "イメージ" とかが来ても拾えるように
                return targetCategories.some(cat => item.category.includes(cat.replace('系', '')));
            });

            render(filtered);
        }

        function render(items) {
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">該当する暗記法が見つかりませんでした。</p>';
                return;
            }

            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'skill-card';
                // アニメーション適用（CSS側で定義された fadeInUp を使用）
                div.style.opacity = '0'; // 初期状態は非表示
                div.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.05}s`;

                // アイコンの自動割り当て (簡易的)
                let icon = '📝';
                if (item.category.includes('イメージ') || item.category.includes('音楽') || item.category.includes('創造')) icon = '🖼️';
                else if (item.category.includes('反復') || item.category.includes('音声')) icon = '🔁';
                else if (item.category.includes('構造') || item.category.includes('整理')) icon = '🏗️';
                else if (item.category.includes('身体')) icon = '💪';
                else if (item.category.includes('物語')) icon = '📖';

                // タグの色分け
                let tagClass = 'tag-basic';
                if (item.category.includes('構造') || item.category.includes('整理') || item.category.includes('論理')) tagClass = 'tag-advanced';

                div.innerHTML = `
                    <div class="skill-header">
                        <span class="skill-icon">${icon}</span>
                        <span class="skill-tag ${tagClass}">${item.category}</span>
                    </div>
                    <div class="skill-body">
                        <h3>${item.title}</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0.5rem 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                            ${item.usage}
                        </p>
                        <span class="try-btn">詳細を見る</span>
                    </div>
                `;

                div.addEventListener('click', () => openModal(item));
                grid.appendChild(div);
            });
        }

        function openModal(data) {
            const modalBody = document.getElementById('modal-body');

            modalBody.innerHTML = `
                <div style="margin-bottom: 1.5rem;">
                    <span style="background: rgba(0, 243, 255, 0.1); color: var(--accent-cyan); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(0, 243, 255, 0.3);">
                        ${data.category}
                    </span>
                </div>
                <h2 style="margin-bottom: 1.5rem; color: #fff; font-size: 1.8rem;">${data.title}</h2>
                
                <div style="margin-bottom: 1.5rem;">
                    <h4 style="color: var(--accent-green); margin-bottom: 0.5rem;">👤 向いている人</h4>
                    <p style="color: var(--text-main); font-size: 0.95rem;">${data.target}</p>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <h4 style="color: var(--accent-cyan); margin-bottom: 0.5rem;">⚔️ 使い方</h4>
                    <p style="color: var(--text-main); line-height: 1.6;">${data.usage}</p>
                </div>

                <div style="background: rgba(255, 255, 255, 0.05); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--accent-purple);">
                    <h4 style="color: var(--accent-purple); margin-bottom: 0.5rem; font-size: 0.9rem;">💡 具体例</h4>
                    <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">${data.example}</p>
                </div>

                <button onclick="closeModal()" class="btn btn-primary" style="margin-top: 2rem; width: 100%; padding: 12px; background: var(--hover-card); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s;">
                    閉じる
                </button>
            `;

            // ボタンのホバーエフェクト（インラインでも書けるがJSで制御してもよい）
            const btn = modalBody.querySelector('button');
            btn.onmouseover = () => {
                btn.style.background = 'var(--accent-cyan)';
                btn.style.color = '#000';
            };
            btn.onmouseout = () => {
                btn.style.background = 'var(--hover-card)';
                btn.style.color = 'var(--accent-cyan)';
            };

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Init
        loadData();

    </script>
    <a href="mypage.html" class="nav-mypage-btn">👤 マイページ</a>
</body>

</html>
